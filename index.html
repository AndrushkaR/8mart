<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>С праздником, родная! 💜</title>

  <!-- Preload ресурсов -->
  <link rel="preload" as="image" href="gif2.gif">
  <link rel="preload" as="image" href="photo1.jpg">
  <link rel="preload" as="image" href="photo2.jpg">
  <link rel="preload" as="image" href="photo3.jpg">
  <link rel="preload" as="image" href="photo-heart.jpg">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      height: 100dvh;
      font-family: system-ui, sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
      touch-action: manipulation;
    }
    #rain-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      overflow: hidden;
    }
    .rain-col {
      position: absolute;
      top: -220vh;
      font-family: 'Courier New', monospace;
      font-size: 1.35rem;
      line-height: 1;
      color: #c300ff;
      text-shadow: 0 0 15px #c300ffcc, 0 0 30px #c300ff88;
      white-space: pre;
      animation: fall linear infinite;
      will-change: transform;
    }
    .lead { color:#ffffff; text-shadow:0 0 25px #fff, 0 0 50px #c300ff; font-weight:bold; }
    .fade { opacity:0.48; }

    @keyframes fall {
      to { transform: translateY(240vh); }
    }

    section {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 12vh;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.9s ease;
      z-index: 2;
    }
    section.active { opacity: 1; pointer-events: all; }

    #count {
      font-size: 38vw;
      font-weight: 900;
      color: #d500ff;
      text-shadow: 0 0 80px #d500ff, 0 0 160px #d500ffaa;
      letter-spacing: -14px;
      margin-top: 8vh;
    }

    .phrase {
      font-size: clamp(9vw, 13vw, 80px);
      font-weight: bold;
      margin: 16px 0;
      opacity: 0;
      transform: scale(0.3);
      transition: all 1.6s ease-out;
      text-shadow: 0 0 45px currentColor;
    }
    .phrase.visible { opacity: 1; transform: scale(1); }

    .big-heart { font-size: clamp(18vw, 24vw, 140px); color: #d500ff; animation: beat 1.8s infinite; }
    @keyframes beat { 0%,100% { transform: scale(1) } 50% { transform: scale(1.25) } }

    #gif2 {
      max-width: 82vw;
      margin: 4vh 0 8vh;
      opacity: 0;
      transition: opacity 1.6s;
    }

    #card-container {
      width: 90vw;
      max-width: 380px;
      height: 58vh;
      max-height: 500px;
      perspective: clamp(800px, 1700px, 3000px);
      margin-top: 6vh;
    }
    #card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 1.9s cubic-bezier(0.68, -0.6, 0.265, 1.6);
      clip-path: polygon(50% 0%, 90% 20%, 100% 60%, 75% 100%, 25% 100%, 0% 60%, 10% 20%);
    }
    #card.flipped { transform: rotateY(180deg); }

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      overflow: hidden;
      box-shadow: 0 18px 80px #000e;
    }
    .front {
      background: linear-gradient(135deg, #3a005c, #9000d0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14vw;
      font-weight: bold;
      color: #ffffff;
      text-shadow: 0 0 40px #fff9;
      z-index: 2;
    }
    .back {
      transform: rotateY(180deg);
      background: #000;
      z-index: 1;
    }
    .back img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      /* Если фото всё равно не видно — закомментируй следующую строку: */
      /* clip-path: polygon(50% 0%, 90% 20%, 100% 60%, 75% 100%, 25% 100%, 0% 60%, 10% 20%); */
    }

    /* ─── Фикс видимости фото после открытия ─── */
    #card.flipped .front {
      opacity: 0 !important;
      visibility: hidden !important;
      pointer-events: none !important;
    }

    #card .back,
    #card.flipped .back {
      opacity: 1 !important;
      visibility: visible !important;
    }

    #card-photo {
      opacity: 1 !important;
      display: block !important;
    }

    .bubble {
      position: absolute;
      top: 12%;
      left: 10%;
      right: 10%;
      background: rgba(255,255,255,0.97);
      color: #120024;
      padding: 20px 24px;
      border-radius: 20px;
      font-size: 5vw;
      line-height: 1.45;
      box-shadow: 0 8px 30px #000c;
      pointer-events: none;
      z-index: 3;
    }

    #final-heart-container {
      position: relative;
      width: 86vw;
      max-width: 420px;
      height: 86vw;
      max-height: 420px;
      margin-top: 6vh;
    }
    #final-heart {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 100px #d500ffcc, 0 0 200px #d500ff77;
      opacity: 0;
      transform: scale(0);
      transition: all 2.8s ease-out;
      animation: pulse-glow 3s infinite alternate;
    }
    @keyframes pulse-glow {
      0%   { box-shadow: 0 0 100px #d500ff88, 0 0 200px #d500ff44; }
      100% { box-shadow: 0 0 140px #d500ffff, 0 0 280px #d500ffaa; }
    }

    #congrats-text {
      position: absolute;
      top: -8vh;
      left: 0; right: 0;
      font-size: 8vw;
      font-weight: bold;
      color: #d500ff;
      text-shadow: 0 0 30px #d500ff, 0 0 60px #d500ff88;
      white-space: nowrap;
      animation: marquee 12s linear infinite;
      opacity: 0;
      transition: opacity 1s;
    }
    #congrats-text.visible { opacity: 1; }
    @keyframes marquee {
      0%   { transform: translateX(120vw); }
      100% { transform: translateX(-120vw); }
    }

    .buttons {
      position: fixed;
      bottom: 5vh;
      left: 5vw; right: 5vw;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s;
    }
    .buttons.visible {
      opacity: 1;
      pointer-events: all;
    }
    .btn {
      padding: 12px 28px;
      font-size: 4.5vw;
      min-width: 120px;
      max-width: 45%;
      font-weight: bold;
      background: #d500ff;
      color: #000;
      border: none;
      border-radius: 16px;
      box-shadow: 0 6px 20px #d500ff66;
      cursor: pointer;
      touch-action: manipulation;
    }
    .btn:active { transform: scale(0.95); }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div id="rain-bg"></div>

  <section id="count-section" class="active">
    <div id="count">3</div>
  </section>

  <section id="words-section">
    <div class="phrase" id="w1">С</div>
    <div class="phrase" id="w2">Праздником</div>
    <div class="phrase" id="w3">Родная</div>
    <div class="phrase" id="w4"><span class="big-heart">❤️</span></div>
    <img id="gif2" src="gif2.gif" alt="поздравление">
  </section>

  <section id="card-section">
    <div id="card-container">
      <div id="card">
        <div class="face front">Открытка</div>
        <div class="face back">
          <img id="card-photo" src="photo1.jpg" alt="фото">
          <div class="bubble">Люблю тебя безумно! 💜</div>
        </div>
      </div>
    </div>

    <div id="final-heart-container">
      <img id="final-heart" src="photo-heart.jpg" alt="сердце">
      <div id="congrats-text">С праздником!!!</div>
    </div>

    <div class="buttons" id="card-buttons">
      <button class="btn" id="btn-open">Открыть</button>
      <button class="btn" id="btn-next" disabled>Следующее фото</button>
      <button class="btn" id="btn-heart" disabled>Сердечко</button>
    </div>
  </section>

<script>
const photos = ['photo1.jpg', 'photo2.jpg', 'photo3.jpg'];
let photoIndex = 0;

function initRain() {
  const rain = document.getElementById('rain-bg');
  rain.innerHTML = '';
  const chars = 'СПРАЗДНИКОМ!!!❤️💜ЛЮБЛЮТЕБЯРОДНАЯСЧАСТЬЯ!!! ';
  const colCount = Math.floor(window.innerWidth / 13) + 22;

  for (let i = 0; i < colCount; i++) {
    const col = document.createElement('div');
    col.className = 'rain-col';
    col.style.left = `${i * 2.4}vw`;
    col.style.animationDuration = `${5 + Math.random() * 25}s`;
    col.style.animationDelay = `-${Math.random() * 22}s`;

    let text = '';
    const len = 50 + Math.floor(Math.random() * 80);
    for (let j = 0; j < len; j++) {
      const ch = chars[Math.floor(Math.random() * chars.length)];
      if (j === 0) text += `<span class="lead">${ch}</span>`;
      else if (j < 12) text += `<span>${ch}</span>`;
      else text += `<span class="fade">${ch}</span>`;
    }

    if (Math.random() < 0.7) {
      const phrases = ['С П Р А З Д Н И К О М ! ! !', 'С ПРАЗДНИКОМ!!! ❤️', 'Л Ю Б Л Ю Т Е Б Я', 'С Д Н Ё М Р О Ж Д Е Н И Я !!!'];
      const ph = phrases[Math.floor(Math.random() * phrases.length)];
      const pos = Math.floor(Math.random() * (len - 15));
      text = text.slice(0, pos) + ph + text.slice(pos + ph.length);
    }

    col.innerHTML = text;
    rain.appendChild(col);
  }
}

const sections = [
  document.getElementById('count-section'),
  document.getElementById('words-section'),
  document.getElementById('card-section')
];

function showSection(idx) {
  sections.forEach((s, i) => s.classList.toggle('active', i === idx));
  if (idx === 2) {
    setTimeout(() => document.getElementById('card-buttons').classList.add('visible'), 600);
  }
}

async function showWords() {
  const words = [document.getElementById('w1'), document.getElementById('w2'), document.getElementById('w3'), document.getElementById('w4')];
  for (const el of words) {
    el.classList.add('visible');
    await new Promise(r => setTimeout(r, 2600));
    if (el !== words.at(-1)) el.classList.remove('visible');
  }
  document.getElementById('gif2').style.opacity = '1';
  await new Promise(r => setTimeout(r, 4200));
  showSection(2);
}

function countdown() {
  const el = document.getElementById('count');
  let n = 3;
  el.textContent = n;
  const interval = setInterval(() => {
    n--;
    el.textContent = n;
    if (n <= 0) {
      clearInterval(interval);
      setTimeout(() => { showSection(1); showWords(); }, 1400);
    }
  }, 1600);
}

const card = document.getElementById('card');
const cardPhoto = document.getElementById('card-photo');
const btnOpen  = document.getElementById('btn-open');
const btnNext  = document.getElementById('btn-next');
const btnHeart = document.getElementById('btn-heart');

btnNext.addEventListener('click', () => {
  photoIndex = (photoIndex + 1) % photos.length;
  cardPhoto.src = photos[photoIndex];
});

btnOpen.addEventListener('click', () => {
  card.classList.add('flipped');
  btnOpen.style.display = 'none';
  btnNext.disabled = false;
  btnHeart.disabled = false;
});

btnHeart.addEventListener('click', () => {
  card.classList.remove('flipped');
  setTimeout(() => {
    document.getElementById('final-heart').style.opacity = '1';
    document.getElementById('final-heart').style.transform = 'scale(1)';
    document.getElementById('congrats-text').classList.add('visible');
    document.getElementById('card-buttons').classList.remove('visible');
  }, 900);
});

function startExperience() {
  initRain();
  countdown();
}

window.addEventListener('load', startExperience);
window.addEventListener('orientationchange', () => setTimeout(startExperience, 400));
window.addEventListener('resize', () => {
  clearTimeout(window.resizeTimer);
  window.resizeTimer = setTimeout(initRain, 300);
});
</script>
</body>
</html>
