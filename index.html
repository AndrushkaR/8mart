<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>С праздником, родная! 💜</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html {
      height:100%;
      font-family:system-ui, sans-serif;
      background:#000;
      color:#fff;
      overflow:hidden;
      touch-action:manipulation;
    }

    #rain-bg {
      position:fixed;
      inset:0;
      overflow:hidden;
      z-index:-1;
      pointer-events:none;
    }

    .rain-col {
      position:absolute;
      top:-220vh;
      font-family:'Courier New', monospace;
      font-size:1.35rem;
      line-height:1.0;
      color:#c300ff;
      text-shadow:0 0 15px #c300ffcc, 0 0 30px #c300ff88;
      white-space:pre;
      animation:fall linear infinite;
    }

    .lead { color:#ffffff; text-shadow:0 0 25px #fff, 0 0 50px #c300ff; font-weight:bold; }
    .fade  { opacity:0.48; }

    @keyframes fall {
      0%   { transform:translateY(-220%); }
      100% { transform:translateY(240vh); }
    }

    section {
      position:fixed;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      opacity:0;
      pointer-events:none;
      transition:opacity 0.9s ease;
      z-index:2;
    }

    section.active { opacity:1; pointer-events:all; }

    #count {
      font-size:38vw;
      font-weight:900;
      color:#d500ff;
      text-shadow:0 0 80px #d500ff, 0 0 160px #d500ffaa;
      letter-spacing:-14px;
    }

    .phrase {
      font-size:15vw;
      font-weight:bold;
      margin:22px 0;
      opacity:0;
      transform:scale(0.3);
      transition:all 1.6s ease-out;
      text-shadow:0 0 45px currentColor;
    }

    .phrase.visible { opacity:1; transform:scale(1); }

    .big-heart { font-size:26vw; color:#d500ff; animation:beat 1.8s infinite; }

    @keyframes beat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.25)} }

    #gif2 { max-width:82vw; margin-top:70px; opacity:0; transition:opacity 1.6s; }

    #card-container {
      width:95vw;
      max-width:440px;
      height:76vh;
      max-height:580px;
      perspective:1700px;
    }

    #card {
      width:100%; height:100%;
      position:relative;
      transform-style:preserve-3d;
      transition:transform 1.9s cubic-bezier(0.68,-0.6,0.265,1.6);
    }

    .face {
      position:absolute;
      inset:0;
      backface-visibility:hidden;
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 18px 80px #000e;
    }

    .front {
      background:linear-gradient(135deg,#3a005c,#9000d0);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14vw;
      font-weight:bold;
      color:#ffffff;
      text-shadow:0 0 40px #fff9;
    }

    .back { transform:rotateY(180deg); background:#000; }

    .back img { width:100%; height:100%; object-fit:cover; }

    .bubble {
      position:absolute;
      top:8%; left:8%; right:8%;
      background:rgba(255,255,255,0.97);
      color:#120024;
      padding:22px 26px;
      border-radius:24px;
      font-size:5.5vw;
      line-height:1.45;
      box-shadow:0 10px 35px #000c;
      pointer-events:none;
    }

    #final-heart {
      width:86vw; max-width:420px;
      height:86vw; max-height:420px;
      border-radius:50%;
      object-fit:cover;
      box-shadow:0 0 100px #d500ffcc, 0 0 200px #d500ff77;
      opacity:0;
      transform:scale(0);
      transition:all 2.8s ease-out;
    }

    #final-heart.visible { opacity:1; transform:scale(1); }

    #touch-zone { position:fixed; inset:0; z-index:999; touch-action:pan-y; }
  </style>
</head>
<body>

  <div id="rain-bg"></div>

  <section id="count-section" class="active">
    <div id="count">3</div>
  </section>

  <section id="words-section">
    <div class="phrase" id="w1">С</div>
    <div class="phrase" id="w2">Праздником</div>
    <div class="phrase" id="w3">Родная</div>
    <div class="phrase" id="w4"><span class="big-heart">❤️</span></div>
    <img id="gif2" src="gif2.gif" alt="поздравление">
  </section>

  <section id="card-section">
    <div id="card-container">
      <div id="card">
        <div class="face front">Открытка</div>
        <div class="face back">
          <img src="photo1.jpg" alt="фото">
          <div class="bubble">Люблю тебя безумно! 💜</div>
        </div>
      </div>
    </div>
    <img id="final-heart" src="photo-heart.jpg" alt="сердце">
  </section>

  <div id="touch-zone"></div>

<script>
// ──────────────────────────────────────────────────────────
// Дождь-фон (всегда)
function startRain() {
  const rain = document.getElementById('rain-bg');
  rain.innerHTML = '';

  const chars = 'СПРАЗДНИКОМ!!!❤️💜ЛЮБЛЮТЕБЯРОДНАЯСЧАСТЬЯ!!!   ';

  const cols = Math.floor(window.innerWidth / 13) + 22;

  for (let i = 0; i < cols; i++) {
    const col = document.createElement('div');
    col.className = 'rain-col';
    col.style.left = `${i * 2.4}vw`;
    col.style.animationDuration = `${5 + Math.random() * 25}s`;
    col.style.animationDelay = `-${Math.random() * 22}s`;

    let content = '';
    const len = 50 + Math.floor(Math.random() * 80);

    for (let j = 0; j < len; j++) {
      const ch = chars[Math.floor(Math.random() * chars.length)];
      if (j === 0) content += `<span class="lead">${ch}</span>`;
      else if (j < 12) content += `<span>${ch}</span>`;
      else content += `<span class="fade">${ch}</span>`;
    }

    if (Math.random() < 0.7) {
      const ph = ['С П Р А З Д Н И К О М ! ! !', 'С ПРАЗДНИКОМ!!! ❤️', 'Л Ю Б Л Ю   Т Е Б Я', 'С Д Н Ё М   Р О Ж Д Е Н И Я !!!'][Math.floor(Math.random()*4)];
      const pos = Math.floor(Math.random() * (len - 15));
      content = content.substring(0, pos*12) + ph + content.substring((pos + ph.length)*12);
    }

    col.innerHTML = content;
    rain.appendChild(col);
  }

  setTimeout(startRain, 10000 + Math.random() * 15000);
}

startRain(); // запускаем сразу

// ──────────────────────────────────────────────────────────
// Сцены
const sections = [
  document.getElementById('count-section'),
  document.getElementById('words-section'),
  document.getElementById('card-section')
];

let cur = 0;

function show(idx) {
  sections.forEach(s => s.classList.remove('active'));
  if (sections[idx]) sections[idx].classList.add('active');
  cur = idx;
}

// ──────────────────────────────────────────────────────────
// Отсчёт → слова → открытка
function countdown() {
  const el = document.getElementById('count');
  let n = 3;
  el.textContent = n;

  const t = setInterval(() => {
    n--;
    el.textContent = n;
    if (n <= 0) {
      clearInterval(t);
      setTimeout(() => {
        show(1);
        showWords();
      }, 1600);
    }
  }, 1700);
}

// Слова + гифка
function showWords() {
  const ws = [
    document.getElementById('w1'),
    document.getElementById('w2'),
    document.getElementById('w3'),
    document.getElementById('w4')
  ];

  let i = 0;
  const iv = setInterval(() => {
    if (i > 0) ws[i-1].classList.remove('visible');
    if (i < ws.length) {
      ws[i].classList.add('visible');
      i++;
    } else {
      clearInterval(iv);
      setTimeout(() => {
        document.getElementById('gif2').style.opacity = '1';
      }, 2400);
      setTimeout(() => show(2), 6800);
    }
  }, 2800);
}

// Открытка
const card = document.getElementById('card');
card.addEventListener('click', () => {
  card.classList.toggle('flipped');
  card.style.transform = card.classList.contains('flipped')
    ? 'rotateY(180deg)'
    : 'rotateY(0deg)';
});

// Финальное сердце после свайпа вверх на открытой открытке
let touchY = 0;
document.getElementById('touch-zone').addEventListener('touchstart', e => {
  touchY = e.touches[0].clientY;
}, {passive:true});

document.getElementById('touch-zone').addEventListener('touchend', e => {
  if (cur !== 2) return;
  const d = touchY - e.changedTouches[0].clientY;
  if (d > 120 && card.classList.contains('flipped')) {
    card.classList.remove('flipped');
    card.style.transform = 'rotateY(0deg)';
    setTimeout(() => {
      document.getElementById('final-heart').classList.add('visible');
    }, 1600);
  }
}, {passive:true});

// ──────────────────────────────────────────────────────────
// Запуск отсчёта сразу (если уже горизонтально) или после поворота
function checkAndStart() {
  if (window.innerWidth > window.innerHeight) {
    countdown();
  }
}

checkAndStart();
window.addEventListener('orientationchange', () => {
  setTimeout(checkAndStart, 300);
});
window.addEventListener('resize', () => {
  setTimeout(checkAndStart, 300);
});
</script>
</body>
</html>
