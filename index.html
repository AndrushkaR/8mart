<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>С праздником, родная! 💜</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html {
      height:100%;
      font-family:system-ui, sans-serif;
      background:#000;
      color:#fff;
      overflow:hidden;
      touch-action:manipulation;
    }
    #rain-bg {
      position:fixed;
      inset:0;
      overflow:hidden;
      z-index:-1;
      pointer-events:none;
    }
    .rain-col {
      position:absolute;
      top:-220vh;
      font-family:'Courier New', monospace;
      font-size:1.35rem;
      line-height:1.0;
      color:#c300ff;
      text-shadow:0 0 15px #c300ffcc, 0 0 30px #c300ff88;
      white-space:pre;
      animation:fall linear infinite;
    }
    .lead { color:#ffffff; text-shadow:0 0 25px #fff, 0 0 50px #c300ff; font-weight:bold; }
    .fade { opacity:0.48; }
    @keyframes fall {
      0% { transform:translateY(-220%); }
      100% { transform:translateY(240vh); }
    }

    section {
      position:fixed;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      padding-top:12vh;
      opacity:0;
      pointer-events:none;
      transition:opacity 0.9s ease;
      z-index:2;
    }
    section.active { opacity:1; pointer-events:all; }

    #count { font-size:38vw; font-weight:900; color:#d500ff; text-shadow:0 0 80px #d500ff, 0 0 160px #d500ffaa; letter-spacing:-14px; margin-top:8vh; }
    .phrase { font-size: clamp(9vw, 13vw, 80px); font-weight:bold; margin:16px 0; opacity:0; transform:scale(0.3); transition:all 1.6s ease-out; text-shadow:0 0 45px currentColor; }
    .phrase.visible { opacity:1; transform:scale(1); }
    .big-heart { font-size: clamp(18vw, 24vw, 140px); color:#d500ff; animation:beat 1.8s infinite; }
    @keyframes beat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.25)} }
    #gif2 { max-width:82vw; margin:4vh 0 8vh; opacity:0; transition:opacity 1.6s; }

    /* ==================== СЛАЙДЕР ФОТО ==================== */
    #photos-section {
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      z-index:3;
    }
    #photos-section.active { display:flex; }

    .slider {
      width: 92vw;
      max-width: 420px;
      height: 65vh;
      max-height: 520px;
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 60px #d500ff66;
    }
    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1.2s ease;
      object-fit: cover;
    }
    .slide.active {
      opacity: 1;
      z-index: 2;
    }

    .slider-controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 10;
    }
    .dot {
      width: 12px;
      height: 12px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      transition: all 0.4s;
    }
    .dot.active {
      background: #d500ff;
      transform: scale(1.4);
    }

    #final-heart-container {
      position: relative;
      width: 86vw;
      max-width: 420px;
      height: 86vw;
      max-height: 420px;
      margin-top: 6vh;
      opacity: 0;
      transition: opacity 2s ease;
    }
    #final-heart-container.visible {
      opacity: 1;
    }
    #final-heart {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 100px #d500ffcc, 0 0 200px #d500ff77;
      animation: pulse-glow 3s infinite alternate;
    }
    @keyframes pulse-glow {
      0% { box-shadow: 0 0 100px #d500ff88, 0 0 200px #d500ff44; }
      100% { box-shadow: 0 0 140px #d500ffff, 0 0 280px #d500ffaa; }
    }
    #congrats-text {
      position: absolute;
      top: -8vh;
      left: 0; right: 0;
      font-size: 8vw;
      font-weight: bold;
      color: #d500ff;
      text-shadow: 0 0 30px #d500ff, 0 0 60px #d500ff88;
      white-space: nowrap;
      animation: marquee 12s linear infinite;
      opacity: 0;
      transition: opacity 1.5s;
    }
    #congrats-text.visible { opacity: 1; }
    @keyframes marquee {
      0% { transform: translateX(120vw); }
      100% { transform: translateX(-120vw); }
    }

    .buttons {
      position: fixed;
      bottom: 5vh;
      left: 5vw;
      right: 5vw;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s;
    }
    .buttons.visible { opacity: 1; pointer-events: all; }
    .btn {
      padding: 12px 28px;
      font-size: 4.5vw;
      min-width: 120px;
      max-width: 45%;
      font-weight: bold;
      background: #d500ff;
      color: #000;
      border: none;
      border-radius: 16px;
      box-shadow: 0 6px 20px #d500ff66;
      cursor: pointer;
    }
    .btn:active { transform: scale(0.95); }
  </style>
</head>
<body>
  <div id="rain-bg"></div>

  <section id="count-section" class="active">
    <div id="count">3</div>
  </section>

  <section id="words-section">
    <div class="phrase" id="w1">С</div>
    <div class="phrase" id="w2">Праздником</div>
    <div class="phrase" id="w3">Родная</div>
    <div class="phrase" id="w4"><span class="big-heart">❤️</span></div>
    <img id="gif2" src="gif2.gif" alt="поздравление">
  </section>

  <!-- Новый слайдер вместо открытки -->
  <div id="photos-section">
    <div class="slider" id="slider">
      <img class="slide" src="photo1.jpg" alt="">
      <img class="slide" src="photo2.jpg" alt="">
      <img class="slide" src="photo3.jpg" alt="">
    </div>
    <div class="slider-controls" id="dots"></div>
  </div>

  <div id="final-heart-container">
    <img id="final-heart" src="photo-heart.jpg" alt="сердце">
    <div id="congrats-text">С праздником!!!</div>
  </div>

  <div class="buttons" id="card-buttons">
    <button class="btn" id="btn-heart">Сердечко</button>
  </div>

  <!-- Музыка -->
  <audio id="bg-music" loop preload="auto" playsinline>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

<script>
// ====================== ДОЖДЬ ======================
function startRain() {
  const rain = document.getElementById('rain-bg');
  rain.innerHTML = '';
  const chars = 'СПРАЗДНИКОМ!!!❤️💜ЛЮБЛЮТЕБЯРОДНАЯСЧАСТЬЯ!!! ';
  const cols = Math.floor(window.innerWidth / 13) + 22;
  for (let i = 0; i < cols; i++) {
    const col = document.createElement('div');
    col.className = 'rain-col';
    col.style.left = `${i * 2.4}vw`;
    col.style.animationDuration = `${5 + Math.random() * 25}s`;
    col.style.animationDelay = `-${Math.random() * 22}s`;
    let content = '';
    const len = 50 + Math.floor(Math.random() * 80);
    for (let j = 0; j < len; j++) {
      const ch = chars[Math.floor(Math.random() * chars.length)];
      if (j === 0) content += `<span class="lead">${ch}</span>`;
      else if (j < 12) content += `<span>${ch}</span>`;
      else content += `<span class="fade">${ch}</span>`;
    }
    if (Math.random() < 0.7) {
      const ph = ['С П Р А З Д Н И К О М ! ! !', 'С ПРАЗДНИКОМ!!! ❤️', 'Л Ю Б Л Ю Т Е Б Я', 'С Д Н Ё М Р О Ж Д Е Н И Я !!!'][Math.floor(Math.random()*4)];
      const pos = Math.floor(Math.random() * (len - 15));
      content = content.substring(0, pos*12) + ph + content.substring((pos + ph.length)*12);
    }
    col.innerHTML = content;
    rain.appendChild(col);
  }
  setTimeout(startRain, 10000 + Math.random() * 15000);
}
startRain();

// ====================== СЦЕНЫ ======================
const sections = [
  document.getElementById('count-section'),
  document.getElementById('words-section')
];
let cur = 0;
function show(idx) {
  sections.forEach(s => s.classList.remove('active'));
  sections[idx].classList.add('active');
  cur = idx;
}

// ====================== ОТСЧЁТ И СЛОВА ======================
function countdown() {
  const el = document.getElementById('count');
  let n = 3;
  el.textContent = n;
  const t = setInterval(() => {
    n--;
    el.textContent = n;
    if (n <= 0) {
      clearInterval(t);
      setTimeout(() => {
        show(1);
        showWords();
      }, 1600);
    }
  }, 1700);
}

function showWords() {
  const ws = [
    document.getElementById('w1'),
    document.getElementById('w2'),
    document.getElementById('w3'),
    document.getElementById('w4')
  ];
  let i = 0;
  const iv = setInterval(() => {
    if (i > 0) ws[i-1].classList.remove('visible');
    if (i < ws.length) {
      ws[i].classList.add('visible');
      i++;
    } else {
      clearInterval(iv);
      setTimeout(() => {
        document.getElementById('gif2').style.opacity = '1';
      }, 2400);
      setTimeout(() => startPhotoSlider(), 6800);   // ← переходим к слайдеру
    }
  }, 2800);
}

// ====================== АВТОСЛАЙДЕР ФОТО ======================
const slides = document.querySelectorAll('.slide');
const dotsContainer = document.getElementById('dots');
let currentSlide = 0;
let slideInterval;

function createDots() {
  dotsContainer.innerHTML = '';
  slides.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot';
    if (i === 0) dot.classList.add('active');
    dot.addEventListener('click', () => goToSlide(i));
    dotsContainer.appendChild(dot);
  });
}

function goToSlide(n) {
  slides.forEach(s => s.classList.remove('active'));
  slides[n].classList.add('active');
  document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===n));
  currentSlide = n;
}

function nextSlide() {
  currentSlide = (currentSlide + 1) % slides.length;
  goToSlide(currentSlide);
}

function startPhotoSlider() {
  document.getElementById('photos-section').classList.add('active');
  createDots();
  goToSlide(0);
  
  slideInterval = setInterval(nextSlide, 3500);   // меняется каждые 3.5 секунды

  // Показываем кнопки через 2 секунды после начала слайдера
  setTimeout(() => {
    document.getElementById('card-buttons').classList.add('visible');
  }, 2000);
}

// ====================== КНОПКИ ======================
const btnHeart = document.getElementById('btn-heart');

btnHeart.addEventListener('click', () => {
  clearInterval(slideInterval);                    // останавливаем слайдер
  document.getElementById('photos-section').style.opacity = '0';
  
  setTimeout(() => {
    document.getElementById('photos-section').style.display = 'none';
    document.getElementById('final-heart-container').classList.add('visible');
    document.getElementById('congrats-text').classList.add('visible');
    document.getElementById('card-buttons').classList.remove('visible');
  }, 800);
});

// ====================== МУЗЫКА ======================
const music = document.getElementById('bg-music');
music.volume = 0.3;

document.body.addEventListener('click', () => {
  if (music.paused || music.muted) {
    music.muted = false;
    music.play();
  }
}, { once: true });

// ====================== ЗАПУСК ======================
function checkAndStart() {
  countdown();
}
checkAndStart();

window.addEventListener('orientationchange', () => setTimeout(checkAndStart, 300));
window.addEventListener('resize', () => setTimeout(checkAndStart, 300));
</script>
</body>
</html>
