<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>С праздником, родная! 💜</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html {
      height:100%;
      font-family:system-ui, sans-serif;
      background:#000;
      color:#fff;
      overflow:hidden;
      touch-action:manipulation;
    }

    section {
      position:fixed;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      opacity:0;
      pointer-events:none;
      transition:opacity 0.8s ease;
    }
    section.active { opacity:1; pointer-events:all; }

    /* 1. Переверни телефон */
    #s1 #hint {
      font-size:6vw;
      text-align:center;
      line-height:1.4;
      padding:0 10vw;
      animation:pulse 2.5s infinite;
    }
    #s1 img { max-width:70vw; max-height:35vh; margin:40px 0; }
    @keyframes pulse { 0%,100%{opacity:0.7} 50%{opacity:1} }

    /* 2. Matrix-дождь (исправленный) */
    #s2 { background:#000; }
    .rain {
      position:absolute;
      inset:0;
      overflow:hidden;
    }
    .col {
      position:absolute;
      top:-120vh;
      font-family:'Courier New', Consolas, monospace;
      font-size:1.15rem;
      line-height:1.05;
      color:#c300ff;
      text-shadow:0 0 10px #c300ff99, 0 0 20px #c300ff55;
      white-space:pre;
      animation:fall linear infinite;
    }
    .lead {
      color:#ffffff;
      text-shadow:0 0 15px #fff, 0 0 30px #c300ff;
      font-weight:bold;
    }
    .fade { opacity:0.4; }
    @keyframes fall {
      0%   { transform:translateY(-120%); }
      100% { transform:translateY(140vh); }
    }

    /* 3. Отсчёт */
    #count {
      font-size:28vw;
      font-weight:900;
      color:#d500ff;
      text-shadow:0 0 50px #d500ff, 0 0 100px #d500ff66;
      letter-spacing:-8px;
    }

    /* 4. Слова */
    .word {
      font-size:12vw;
      font-weight:bold;
      margin:15px 0;
      opacity:0;
      transform:scale(0.5);
      transition:all 1.3s ease-out;
      text-shadow:0 0 30px currentColor;
    }
    .word.show { opacity:1; transform:scale(1); }
    .big-heart { font-size:20vw; color:#d500ff; animation:beat 1.5s infinite; }
    @keyframes beat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18)} }
    #gif2 { max-width:70vw; margin-top:40px; opacity:0; transition:opacity 1.2s; }

    /* 5. Открытка + финал */
    #card-wrap {
      width:90vw;
      max-width:380px;
      height:70vh;
      max-height:520px;
      perspective:1400px;
    }
    #card {
      width:100%; height:100%;
      position:relative;
      transform-style:preserve-3d;
      transition:transform 1.6s cubic-bezier(0.68,-0.4,0.265,1.4);
    }
    .face {
      position:absolute;
      inset:0;
      backface-visibility:hidden;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 12px 50px #000c;
    }
    .front {
      background:linear-gradient(135deg,#2a0047,#6000a8);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:11vw;
      font-weight:bold;
      color:#ffccff;
      text-shadow:0 0 25px #fff8;
    }
    .back { transform:rotateY(180deg); background:#111; }
    .back img { width:100%; height:100%; object-fit:cover; }
    .bubble {
      position:absolute;
      top:10%; left:8%; right:8%;
      background:rgba(255,255,255,0.95);
      color:#1a0033;
      padding:16px 20px;
      border-radius:18px;
      font-size:4.8vw;
      line-height:1.4;
      box-shadow:0 5px 20px #0009;
      pointer-events:none;
    }

    #final {
      width:80vw; max-width:360px;
      height:80vw; max-height:360px;
      border-radius:50%;
      object-fit:cover;
      box-shadow:0 0 70px #d500ff99, 0 0 140px #d500ff55;
      opacity:0; transform:scale(0.2);
      transition:all 2s ease-out;
    }
    #final.show { opacity:1; transform:scale(1); }

    #swipe-zone { position:fixed; inset:0; z-index:999; touch-action:pan-y; }
  </style>
</head>
<body>

  <section id="s1" class="active">
    <div id="hint">Переверни телефон<br>горизонтально 😍</div>
    <img src="gif1.gif" alt="поворот">
  </section>

  <section id="s2">
    <div class="rain"></div>
  </section>

  <section id="s3">
    <div id="count">3</div>
  </section>

  <section id="s4">
    <div class="word" id="w1">С</div>
    <div class="word" id="w2">Праздником</div>
    <div class="word" id="w3">Родная</div>
    <div class="word" id="w4"><span class="big-heart">❤️</span></div>
    <img id="gif2" src="gif2.gif" alt="поздравление">
  </section>

  <section id="s5">
    <div id="card-wrap">
      <div id="card">
        <div class="face front">Открытка</div>
        <div class="face back">
          <img src="photo1.jpg" alt="фото">
          <div class="bubble">Люблю тебя безумно! 💜</div>
        </div>
      </div>
    </div>
    <img id="final" src="photo-heart.jpg" alt="сердце">
  </section>

  <div id="swipe-zone"></div>

<script>
let current = 1;
const sections = document.querySelectorAll('section');

function show(n) {
  sections.forEach(s => s.classList.remove('active'));
  if (sections[n-1]) sections[n-1].classList.add('active');
  current = n;
}

let touchStart = 0;
const swipe = document.getElementById('swipe-zone');

swipe.addEventListener('touchstart', e => {
  touchStart = e.touches[0].clientY;
}, {passive: true});

swipe.addEventListener('touchend', e => {
  const diff = touchStart - e.changedTouches[0].clientY;
  if (Math.abs(diff) > 70) {
    if (diff > 0) nextStep();
    else if (current === 5) prevStep();
  }
}, {passive: true});

function nextStep() {
  if (current === 1) {
    show(2);
    startRain();
    setTimeout(() => show(3), 6500);
    setTimeout(startCountdown, 7000);
  }
}

function prevStep() {
  if (current === 5) {
    card.classList.remove('flip');
    card.style.transform = 'rotateY(0deg)';
    setTimeout(() => document.getElementById('final').classList.remove('show'), 1000);
  }
}

// ─── Дождь ───────────────────────────────────────────────
function startRain() {
  const rainContainer = document.querySelector('#s2 .rain');
  rainContainer.innerHTML = '';

  const russianChars = 'СПРАЗДНИКОМ!!!❤️💜ЛЮБЛЮТЕБЯСЧАСТЬЯЗДОРОВЬЯ!!!';

  const columns = Math.floor(window.innerWidth / 18) + 14;

  for (let i = 0; i < columns; i++) {
    const column = document.createElement('div');
    column.className = 'col';
    column.style.left = `${i * 3.2}vw`;
    column.style.animationDuration = `${10 + Math.random() * 15}s`;
    column.style.animationDelay = `-${Math.random() * 10}s`;

    let content = '';
    const streamLength = 25 + Math.floor(Math.random() * 45);

    for (let j = 0; j < streamLength; j++) {
      const char = russianChars[Math.floor(Math.random() * russianChars.length)];
      if (j === 0) {
        content += `<span class="lead">${char}</span>`;
      } else if (j < 6) {
        content += `<span>${char}</span>`;
      } else {
        content += `<span class="fade">${char}</span>`;
      }
    }

    // Добавляем читаемую фразу иногда
    if (Math.random() < 0.4) {
      const phrase = 'С П Р А З Д Н И К О М !!!';
      const pos = Math.floor(Math.random() * (streamLength - 12));
      const before = content.substring(0, pos * 20);
      const after = content.substring((pos + phrase.length) * 20);
      content = before + phrase + after;
    }

    column.innerHTML = content;
    rainContainer.appendChild(column);
  }

  // Повторяем дождь, пока на этой сцене
  if (current === 2) {
    setTimeout(startRain, 22000);
  }
}

// ─── Отсчёт ───────────────────────────────────────────────
function startCountdown() {
  const el = document.getElementById('count');
  let num = 3;
  el.textContent = num;

  const timer = setInterval(() => {
    num--;
    el.textContent = num;
    if (num <= 0) {
      clearInterval(timer);
      setTimeout(() => {
        show(4);
        showWords();
      }, 1000);
    }
  }, 1400);
}

// ─── Появление слов ───────────────────────────────────────
function showWords() {
  const words = [
    document.getElementById('w1'),
    document.getElementById('w2'),
    document.getElementById('w3'),
    document.getElementById('w4')
  ];

  let idx = 0;
  const interval = setInterval(() => {
    if (idx > 0) words[idx - 1].classList.remove('show');
    if (idx < words.length) {
      words[idx].classList.add('show');
      idx++;
    } else {
      clearInterval(interval);
      setTimeout(() => {
        document.getElementById('gif2').style.opacity = '1';
      }, 1800);
      setTimeout(() => show(5), 5200);
    }
  }, 2200);
}

// ─── Открытка ─────────────────────────────────────────────
const card = document.getElementById('card');
card.addEventListener('click', () => {
  card.classList.toggle('flip');
  card.style.transform = card.classList.contains('flip')
    ? 'rotateY(180deg)'
    : 'rotateY(0deg)';
});

// ─── Финальное сердце после свайпа вверх на открытой открытке ───
swipe.addEventListener('touchend', e => {
  if (current !== 5) return;
  const diff = touchStart - e.changedTouches[0].clientY;
  if (diff > 100 && card.classList.contains('flip')) {
    card.classList.remove('flip');
    card.style.transform = 'rotateY(0deg)';
    setTimeout(() => {
      document.getElementById('final').classList.add('show');
    }, 1200);
  }
});

// Если уже в горизонтальном положении — пропустить первую сцену
if (window.innerWidth > window.innerHeight) {
  nextStep();
}
</script>
</body>
</html>
