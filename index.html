<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>С праздником, родная! 💜</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html {
      height:100%;
      font-family:system-ui, sans-serif;
      background:#000;
      color:#fff;
      overflow:hidden;
      touch-action:manipulation;
    }

    /* Постоянный дождь-фон */
    #rain-bg {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: -1;
      pointer-events: none;
    }

    .col {
      position: absolute;
      top: -150vh;
      font-family: 'Courier New', Consolas, monospace;
      font-size: 1.15rem;
      line-height: 1.0;
      color: #c300ff;
      text-shadow: 0 0 10px #c300ffaa, 0 0 20px #c300ff66;
      white-space: pre;
      animation: fall linear infinite;
    }
    .lead {
      color: #ffffff;
      text-shadow: 0 0 18px #fff, 0 0 35px #c300ff;
      font-weight: bold;
    }
    .fade { opacity: 0.4; }
    @keyframes fall {
      0%   { transform: translateY(-150%); }
      100% { transform: translateY(170vh); }
    }

    /* Сцены поверх дождя */
    section {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
      z-index: 1;
    }
    section.active { opacity: 1; pointer-events: all; }

    /* 1. Переверни телефон */
    #s1 #hint {
      font-size: 6vw;
      text-align: center;
      line-height: 1.4;
      padding: 0 10vw;
      animation: pulse 2.5s infinite;
      z-index: 2;
    }
    #s1 img { max-width: 70vw; max-height: 35vh; margin: 40px 0; z-index: 2; }
    @keyframes pulse { 0%,100%{opacity:0.7} 50%{opacity:1} }

    /* 3. Отсчёт */
    #count {
      font-size: 28vw;
      font-weight: 900;
      color: #d500ff;
      text-shadow: 0 0 50px #d500ff, 0 0 100px #d500ff88;
      letter-spacing: -8px;
      z-index: 2;
    }

    /* 4. Слова */
    .word {
      font-size: 12vw;
      font-weight: bold;
      margin: 15px 0;
      opacity: 0;
      transform: scale(0.5);
      transition: all 1.3s ease-out;
      text-shadow: 0 0 30px currentColor;
      z-index: 2;
    }
    .word.show { opacity: 1; transform: scale(1); }
    .big-heart { font-size: 20vw; color: #d500ff; animation: beat 1.5s infinite; }
    @keyframes beat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18)} }
    #gif2 { max-width: 70vw; margin-top: 40px; opacity: 0; transition: opacity 1.2s; z-index: 2; }

    /* 5. Открытка + финал */
    #card-wrap {
      width: 90vw;
      max-width: 380px;
      height: 70vh;
      max-height: 520px;
      perspective: 1400px;
      z-index: 2;
    }
    #card {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 1.6s cubic-bezier(0.68, -0.4, 0.265, 1.4);
    }
    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 12px 50px #000c;
    }
    .front {
      background: linear-gradient(135deg, #2a0047, #6000a8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11vw;
      font-weight: bold;
      color: #ffccff;
      text-shadow: 0 0 25px #fff8;
    }
    .back { transform: rotateY(180deg); background: #111; }
    .back img { width: 100%; height: 100%; object-fit: cover; }
    .bubble {
      position: absolute;
      top: 10%; left: 8%; right: 8%;
      background: rgba(255,255,255,0.95);
      color: #1a0033;
      padding: 16px 20px;
      border-radius: 18px;
      font-size: 4.8vw;
      line-height: 1.4;
      box-shadow: 0 5px 20px #0009;
      pointer-events: none;
    }

    #final {
      width: 80vw; max-width: 360px;
      height: 80vw; max-height: 360px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 70px #d500ffaa, 0 0 140px #d500ff66;
      opacity: 0; transform: scale(0.2);
      transition: all 2s ease-out;
      z-index: 2;
    }
    #final.show { opacity: 1; transform: scale(1); }

    #swipe-zone { position: fixed; inset: 0; z-index: 10; touch-action: pan-y; }
  </style>
</head>
<body>

  <!-- Дождь как постоянный фон -->
  <div id="rain-bg"></div>

  <section id="s1" class="active">
    <div id="hint">Переверни телефон<br>горизонтально 😍</div>
    <img src="gif1.gif" alt="поворот">
  </section>

  <section id="s3">
    <div id="count">3</div>
  </section>

  <section id="s4">
    <div class="word" id="w1">С</div>
    <div class="word" id="w2">Праздником</div>
    <div class="word" id="w3">Родная</div>
    <div class="word" id="w4"><span class="big-heart">❤️</span></div>
    <img id="gif2" src="gif2.gif" alt="поздравление">
  </section>

  <section id="s5">
    <div id="card-wrap">
      <div id="card">
        <div class="face front">Открытка</div>
        <div class="face back">
          <img src="photo1.jpg" alt="фото">
          <div class="bubble">Люблю тебя безумно! 💜</div>
        </div>
      </div>
    </div>
    <img id="final" src="photo-heart.jpg" alt="сердце">
  </section>

  <div id="swipe-zone"></div>

<script>
let current = 1;
const sections = document.querySelectorAll('section');

function show(n) {
  sections.forEach(s => s.classList.remove('active'));
  if (sections[n-1]) sections[n-1].classList.add('active');
  current = n;
}

let touchStart = 0;
const swipe = document.getElementById('swipe-zone');

swipe.addEventListener('touchstart', e => touchStart = e.touches[0].clientY, {passive:true});
swipe.addEventListener('touchend', e => {
  const diff = touchStart - e.changedTouches[0].clientY;
  if (Math.abs(diff) > 70) {
    if (diff > 0) nextStep();
    else if (current === 5) prevStep();
  }
}, {passive:true});

function nextStep() {
  if (current === 1) {
    show(3);
    setTimeout(startCountdown, 700);
  }
}

function prevStep() {
  if (current === 5) {
    card.classList.remove('flip');
    card.style.transform = 'rotateY(0deg)';
    setTimeout(() => document.getElementById('final').classList.remove('show'), 1000);
  }
}

// Постоянный дождь-фон
function startRain() {
  const container = document.getElementById('rain-bg');
  container.innerHTML = '';

  const chars = 'СПРАЗДНИКОМ!!!❤️💜   ЛЮБЛЮТЕБЯ!!!';

  const columns = Math.floor(window.innerWidth / 16) + 16;

  for (let i = 0; i < columns; i++) {
    const column = document.createElement('div');
    column.className = 'col';
    column.style.left = `${i * 3}vw`;
    column.style.animationDuration = `${8 + Math.random() * 20}s`;
    column.style.animationDelay = `-${Math.random() * 15}s`;

    let content = '';
    const length = 35 + Math.floor(Math.random() * 50);

    for (let j = 0; j < length; j++) {
      const char = chars[Math.floor(Math.random() * chars.length)];
      if (j === 0) content += `<span class="lead">${char}</span>`;
      else if (j < 8) content += `<span>${char}</span>`;
      else content += `<span class="fade">${char}</span>`;
    }

    // Вставляем фразы чаще
    if (Math.random() < 0.6) {
      const phrases = ['С П Р А З Д Н И К О М ! ! !', 'Л Ю Б Л Ю   Т Е Б Я', 'С Д Н Ё М   Р О Ж Д Е Н И Я !!!'];
      const phrase = phrases[Math.floor(Math.random() * phrases.length)];
      const pos = Math.floor(Math.random() * (length - phrase.length / 2));
      content = content.substring(0, pos * 12) + phrase + content.substring((pos + phrase.length) * 12);
    }

    column.innerHTML = content;
    container.appendChild(column);
  }

  // Бесконечно обновляем дождь
  setTimeout(startRain, 15000 + Math.random() * 10000);
}

// Запускаем дождь сразу и навсегда
startRain();

// Отсчёт
function startCountdown() {
  const el = document.getElementById('count');
  let num = 3;
  el.textContent = num;

  const timer = setInterval(() => {
    num--;
    el.textContent = num;
    if (num <= 0) {
      clearInterval(timer);
      setTimeout(() => {
        show(4);
        showWords();
      }, 1000);
    }
  }, 1400);
}

// Слова
function showWords() {
  const words = [
    document.getElementById('w1'),
    document.getElementById('w2'),
    document.getElementById('w3'),
    document.getElementById('w4')
  ];

  let idx = 0;
  const interval = setInterval(() => {
    if (idx > 0) words[idx - 1].classList.remove('show');
    if (idx < words.length) {
      words[idx].classList.add('show');
      idx++;
    } else {
      clearInterval(interval);
      setTimeout(() => document.getElementById('gif2').style.opacity = '1', 1800);
      setTimeout(() => show(5), 5200);
    }
  }, 2200);
}

// Открытка
const card = document.getElementById('card');
card.addEventListener('click', () => {
  card.classList.toggle('flip');
  card.style.transform = card.classList.contains('flip')
    ? 'rotateY(180deg)'
    : 'rotateY(0deg)';
});

// Финальное сердце
swipe.addEventListener('touchend', e => {
  if (current !== 5) return;
  const diff = touchStart - e.changedTouches[0].clientY;
  if (diff > 100 && card.classList.contains('flip')) {
    card.classList.remove('flip');
    card.style.transform = 'rotateY(0deg)';
    setTimeout(() => document.getElementById('final').classList.add('show'), 1200);
  }
});

// Автозапуск, если уже в горизонтальном положении
if (window.innerWidth > window.innerHeight) {
  nextStep();
}
</script>
</body>
</html>
