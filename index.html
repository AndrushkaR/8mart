<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>С праздником, родная! 💜</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html {
      height:100%;
      font-family:system-ui, -apple-system, sans-serif;
      background:#000;
      color:#fff;
      overflow:hidden;
      touch-action:manipulation;
    }

    /* Постоянный дождь-фон */
    #rain {
      position:fixed;
      inset:0;
      overflow:hidden;
      z-index:-1;
      pointer-events:none;
    }

    .column {
      position:absolute;
      top:-180vh;
      font-family:'Courier New', monospace;
      font-size:1.25rem;
      line-height:1.05;
      color:#c300ff;
      text-shadow:0 0 12px #c300ffaa, 0 0 24px #c300ff66;
      white-space:pre;
      animation:fall linear infinite;
    }

    .lead {
      color:#ffffff;
      text-shadow:0 0 20px #fff, 0 0 40px #c300ff;
      font-weight:bold;
    }

    .fade { opacity:0.45; }

    @keyframes fall {
      0%   { transform:translateY(-180%); }
      100% { transform:translateY(200vh); }
    }

    /* Сцены */
    section {
      position:fixed;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      opacity:0;
      pointer-events:none;
      transition:opacity 0.8s ease;
      z-index:1;
    }

    section.active {
      opacity:1;
      pointer-events:all;
    }

    /* Сцена 1 — поворот */
    #scene1 #hint {
      font-size:6.5vw;
      text-align:center;
      line-height:1.4;
      padding:0 12vw;
      animation:pulse 2.8s infinite;
    }

    #scene1 img {
      max-width:75vw;
      max-height:38vh;
      margin:45px 0;
    }

    @keyframes pulse { 0%,100%{opacity:0.65} 50%{opacity:1} }

    /* Отсчёт */
    #countdown {
      font-size:32vw;
      font-weight:900;
      color:#d500ff;
      text-shadow:0 0 60px #d500ff, 0 0 120px #d500ff88;
      letter-spacing:-10px;
    }

    /* Слова */
    .phrase {
      font-size:13vw;
      font-weight:bold;
      margin:18px 0;
      opacity:0;
      transform:scale(0.4);
      transition:all 1.4s ease-out;
      text-shadow:0 0 35px currentColor;
    }

    .phrase.visible {
      opacity:1;
      transform:scale(1);
    }

    .heart-big {
      font-size:22vw;
      color:#d500ff;
      animation:heartbeat 1.6s infinite;
    }

    @keyframes heartbeat {
      0%,100% { transform:scale(1); }
      50%     { transform:scale(1.2); }
    }

    #congrats-gif {
      max-width:75vw;
      margin-top:50px;
      opacity:0;
      transition:opacity 1.4s;
    }

    /* Открытка */
    #card-container {
      width:92vw;
      max-width:400px;
      height:72vh;
      max-height:540px;
      perspective:1500px;
    }

    #card {
      width:100%;
      height:100%;
      position:relative;
      transform-style:preserve-3d;
      transition:transform 1.7s cubic-bezier(0.68,-0.55,0.265,1.55);
    }

    .face {
      position:absolute;
      inset:0;
      backface-visibility:hidden;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 14px 60px #000c;
    }

    .front {
      background:linear-gradient(135deg,#30004a,#7000b0);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:12vw;
      font-weight:bold;
      color:#ffdfff;
      text-shadow:0 0 30px #fff8;
    }

    .back { transform:rotateY(180deg); background:#111; }

    .back img {
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .speech-bubble {
      position:absolute;
      top:8%;
      left:8%;
      right:8%;
      background:rgba(255,255,255,0.96);
      color:#180033;
      padding:18px 22px;
      border-radius:20px;
      font-size:5vw;
      line-height:1.4;
      box-shadow:0 6px 25px #000a;
      pointer-events:none;
    }

    /* Финальное сердце */
    #heart-final {
      width:82vw;
      max-width:380px;
      height:82vw;
      max-height:380px;
      border-radius:50%;
      object-fit:cover;
      box-shadow:0 0 80px #d500ffaa, 0 0 160px #d500ff55;
      opacity:0;
      transform:scale(0.1);
      transition:all 2.2s ease-out;
    }

    #heart-final.visible {
      opacity:1;
      transform:scale(1);
    }

    #touch-zone {
      position:fixed;
      inset:0;
      z-index:999;
      touch-action:pan-y;
    }
  </style>
</head>
<body>

  <!-- Дождь — постоянный фон -->
  <div id="rain"></div>

  <!-- Сцена 1 -->
  <section id="scene1" class="active">
    <div id="hint">Переверни телефон<br>горизонтально 😍</div>
    <img src="gif1.gif" alt="поворот телефона">
  </section>

  <!-- Сцена отсчёта -->
  <section id="scene-count">
    <div id="countdown">3</div>
  </section>

  <!-- Сцена слов + гифка -->
  <section id="scene-words">
    <div class="phrase" id="ph1">С</div>
    <div class="phrase" id="ph2">Праздником</div>
    <div class="phrase" id="ph3">Родная</div>
    <div class="phrase" id="ph4"><span class="heart-big">❤️</span></div>
    <img id="congrats-gif" src="gif2.gif" alt="с праздником">
  </section>

  <!-- Сцена открытки -->
  <section id="scene-card">
    <div id="card-container">
      <div id="card">
        <div class="face front">Открытка</div>
        <div class="face back">
          <img src="photo1.jpg" alt="твоё фото">
          <div class="speech-bubble">Люблю тебя безумно! 💜</div>
        </div>
      </div>
    </div>
    <img id="heart-final" src="photo-heart.jpg" alt="сердце из фото">
  </section>

  <div id="touch-zone"></div>

<script>
let currentScene = 1;
const scenes = [
  document.getElementById('scene1'),
  document.getElementById('scene-count'),
  document.getElementById('scene-words'),
  document.getElementById('scene-card')
];

function activateScene(n) {
  scenes.forEach(s => s.classList.remove('active'));
  if (scenes[n-1]) scenes[n-1].classList.add('active');
  currentScene = n;
}

let startY = 0;
const touchZone = document.getElementById('touch-zone');

touchZone.addEventListener('touchstart', e => {
  startY = e.touches[0].clientY;
}, {passive: true});

touchZone.addEventListener('touchend', e => {
  const delta = startY - e.changedTouches[0].clientY;
  if (Math.abs(delta) > 80) {
    if (delta > 0) next();
    else if (currentScene === 4) back();
  }
}, {passive: true});

function next() {
  if (currentScene === 1) {
    activateScene(2);
    startCountdown();
  }
}

function back() {
  if (currentScene === 4) {
    card.classList.remove('opened');
    card.style.transform = 'rotateY(0deg)';
    setTimeout(() => {
      document.getElementById('heart-final').classList.remove('visible');
    }, 1200);
  }
}

// Дождь
function initRain() {
  const rain = document.getElementById('rain');
  rain.innerHTML = '';

  const chars = 'СПРАЗДНИКОМ!!!❤️💜ЛЮБЛЮТЕБЯРОДНАЯ!!!   ';

  const cols = Math.floor(window.innerWidth / 15) + 18;

  for (let i = 0; i < cols; i++) {
    const col = document.createElement('div');
    col.className = 'column';
    col.style.left = `${i * 2.8}vw`;
    col.style.animationDuration = `${7 + Math.random() * 22}s`;
    col.style.animationDelay = `-${Math.random() * 18}s`;

    let str = '';
    const len = 40 + Math.floor(Math.random() * 60);

    for (let j = 0; j < len; j++) {
      const ch = chars[Math.floor(Math.random() * chars.length)];
      if (j === 0) str += `<span class="lead">${ch}</span>`;
      else if (j < 9) str += `<span>${ch}</span>`;
      else str += `<span class="fade">${ch}</span>`;
    }

    if (Math.random() < 0.55) {
      const phr = ['С П Р А З Д Н И К О М ! ! !', 'Л Ю Б Л Ю   Т Е Б Я', 'С Д Н Ё М   Р О Ж Д Е Н И Я !!!'][Math.floor(Math.random()*3)];
      const pos = Math.floor(Math.random() * (len - 12));
      str = str.substring(0, pos*12) + phr + str.substring((pos + phr.length)*12);
    }

    col.innerHTML = str;
    rain.appendChild(col);
  }

  setTimeout(initRain, 14000 + Math.random() * 12000);
}

// Запуск дождя сразу
initRain();

// Отсчёт
function startCountdown() {
  const cd = document.getElementById('countdown');
  let num = 3;
  cd.textContent = num;

  const t = setInterval(() => {
    num--;
    cd.textContent = num;
    if (num <= 0) {
      clearInterval(t);
      setTimeout(() => {
        activateScene(3);
        showPhrases();
      }, 1200);
    }
  }, 1500);
}

// Появление слов
function showPhrases() {
  const ph = [
    document.getElementById('ph1'),
    document.getElementById('ph2'),
    document.getElementById('ph3'),
    document.getElementById('ph4')
  ];

  let i = 0;
  const iv = setInterval(() => {
    if (i > 0) ph[i-1].classList.remove('visible');
    if (i < ph.length) {
      ph[i].classList.add('visible');
      i++;
    } else {
      clearInterval(iv);
      setTimeout(() => {
        document.getElementById('congrats-gif').style.opacity = '1';
      }, 2000);
      setTimeout(() => activateScene(4), 5800);
    }
  }, 2400);
}

// Открытка
const card = document.getElementById('card');
card.addEventListener('click', () => {
  card.classList.toggle('opened');
  card.style.transform = card.classList.contains('opened')
    ? 'rotateY(180deg)'
    : 'rotateY(0deg)';
});

// Финальное сердце
touchZone.addEventListener('touchend', e => {
  if (currentScene !== 4) return;
  const delta = startY - e.changedTouches[0].clientY;
  if (delta > 110 && card.classList.contains('opened')) {
    card.classList.remove('opened');
    card.style.transform = 'rotateY(0deg)';
    setTimeout(() => {
      document.getElementById('heart-final').classList.add('visible');
    }, 1400);
  }
});

// Если уже горизонтально — пропустить первую сцену
if (window.innerWidth > window.innerHeight) {
  activateScene(2);
  startCountdown();
}
</script>
</body>
</html>
