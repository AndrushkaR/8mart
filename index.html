<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>С праздником, родная! 💜</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html {
      height:100%;
      font-family:system-ui, sans-serif;
      background:#000;
      color:#fff;
      overflow:hidden;
      touch-action:manipulation;
    }

    /* Дождь — всегда на фоне */
    #matrix-rain {
      position:fixed;
      inset:0;
      overflow:hidden;
      z-index:-1;
      pointer-events:none;
    }

    .rain-col {
      position:absolute;
      top:-200vh;
      font-family:'Courier New', monospace;
      font-size:1.3rem;
      line-height:1.0;
      color:#c300ff;
      text-shadow:0 0 14px #c300ffbb, 0 0 28px #c300ff77;
      white-space:pre;
      animation:fall linear infinite;
    }

    .rain-lead { color:#fff; text-shadow:0 0 22px #fff, 0 0 45px #c300ff; font-weight:bold; }
    .rain-fade { opacity:0.5; }

    @keyframes fall {
      0%   { transform:translateY(-200%); }
      100% { transform:translateY(220vh); }
    }

    /* Сцены поверх дождя */
    section {
      position:fixed;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      opacity:0;
      pointer-events:none;
      transition:opacity 0.9s ease;
      z-index:2;
    }

    section.active { opacity:1; pointer-events:all; }

    /* Поворот */
    #rotate-screen {
      font-size:7vw;
      text-align:center;
      line-height:1.4;
      padding:0 12vw;
      animation:pulse 3s infinite;
    }

    #rotate-gif { max-width:80vw; max-height:40vh; margin:50px 0; }

    @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }

    /* Отсчёт */
    #count {
      font-size:35vw;
      font-weight:900;
      color:#d500ff;
      text-shadow:0 0 70px #d500ff, 0 0 140px #d500ff99;
      letter-spacing:-12px;
    }

    /* Слова по очереди */
    .word {
      font-size:14vw;
      font-weight:bold;
      margin:20px 0;
      opacity:0;
      transform:scale(0.4);
      transition:all 1.5s ease-out;
      text-shadow:0 0 40px currentColor;
    }

    .word.visible { opacity:1; transform:scale(1); }

    .bigheart { font-size:24vw; color:#d500ff; animation:beat 1.7s infinite; }

    @keyframes beat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.22)} }

    #gif-congrats { max-width:80vw; margin-top:60px; opacity:0; transition:opacity 1.5s; }

    /* Открытка */
    #card-box {
      width:94vw;
      max-width:420px;
      height:74vh;
      max-height:560px;
      perspective:1600px;
    }

    #card-flip {
      width:100%; height:100%;
      position:relative;
      transform-style:preserve-3d;
      transition:transform 1.8s cubic-bezier(0.68,-0.55,0.265,1.55);
    }

    .card-side {
      position:absolute;
      inset:0;
      backface-visibility:hidden;
      border-radius:22px;
      overflow:hidden;
      box-shadow:0 16px 70px #000d;
    }

    .front-side {
      background:linear-gradient(135deg,#350052,#8000c0);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:13vw;
      font-weight:bold;
      color:#ffefff;
      text-shadow:0 0 35px #fff9;
    }

    .back-side { transform:rotateY(180deg); background:#000; }

    .back-side img { width:100%; height:100%; object-fit:cover; }

    .bubble-text {
      position:absolute;
      top:8%; left:8%; right:8%;
      background:rgba(255,255,255,0.97);
      color:#14002a;
      padding:20px 24px;
      border-radius:22px;
      font-size:5.2vw;
      line-height:1.45;
      box-shadow:0 8px 30px #000b;
      pointer-events:none;
    }

    /* Финальное фото-сердце */
    #final-heart-img {
      width:84vw; max-width:400px;
      height:84vw; max-height:400px;
      border-radius:50%;
      object-fit:cover;
      box-shadow:0 0 90px #d500ffbb, 0 0 180px #d500ff66;
      opacity:0;
      transform:scale(0.05);
      transition:all 2.5s ease-out;
    }

    #final-heart-img.visible { opacity:1; transform:scale(1); }

    #swipe-area { position:fixed; inset:0; z-index:999; touch-action:pan-y; }
  </style>
</head>
<body>

  <!-- Дождь всегда -->
  <div id="matrix-rain"></div>

  <section id="rotate-screen" class="active">
    <div id="rotate-screen">Переверни телефон<br>горизонтально 😍</div>
    <img id="rotate-gif" src="gif1.gif" alt="поворот">
  </section>

  <section id="count-screen">
    <div id="count">3</div>
  </section>

  <section id="words-screen">
    <div class="word" id="word-s">С</div>
    <div class="word" id="word-prazd">Праздником</div>
    <div class="word" id="word-rod">Родная</div>
    <div class="word" id="word-heart"><span class="bigheart">❤️</span></div>
    <img id="gif-congrats" src="gif2.gif" alt="поздравление">
  </section>

  <section id="card-screen">
    <div id="card-box">
      <div id="card-flip">
        <div class="card-side front-side">Открытка</div>
        <div class="card-side back-side">
          <img src="photo1.jpg" alt="фото">
          <div class="bubble-text">Люблю тебя безумно! 💜</div>
        </div>
      </div>
    </div>
    <img id="final-heart-img" src="photo-heart.jpg" alt="сердце">
  </section>

  <div id="swipe-area"></div>

<script>
// Сцены
const scenes = [
  document.getElementById('rotate-screen'),
  document.getElementById('count-screen'),
  document.getElementById('words-screen'),
  document.getElementById('card-screen')
];

let current = 0;

function goTo(idx) {
  scenes.forEach(s => s.classList.remove('active'));
  scenes[idx].classList.add('active');
  current = idx;
}

// Дождь
function rainBackground() {
  const rain = document.getElementById('matrix-rain');
  rain.innerHTML = '';

  const textPool = 'С П Р А З Д Н И К О М ! ! ! ❤️ 💜   Л Ю Б Л Ю   Т Е Б Я   ';

  const colCount = Math.floor(window.innerWidth / 14) + 20;

  for (let i = 0; i < colCount; i++) {
    const col = document.createElement('div');
    col.className = 'rain-col';
    col.style.left = `${i * 2.6}vw`;
    col.style.animationDuration = `${6 + Math.random() * 24}s`;
    col.style.animationDelay = `-${Math.random() * 20}s`;

    let line = '';
    const height = 45 + Math.floor(Math.random() * 70);

    for (let j = 0; j < height; j++) {
      const ch = textPool[Math.floor(Math.random() * textPool.length)];
      if (j === 0) line += `<span class="rain-lead">${ch}</span>`;
      else if (j < 10) line += `<span>${ch}</span>`;
      else line += `<span class="rain-fade">${ch}</span>`;
    }

    if (Math.random() < 0.65) {
      const phrases = [
        'С П Р А З Д Н И К О М ! ! !',
        'С П Р А З Д Н И К О М !!! ❤️',
        'Л Ю Б Л Ю   Т Е Б Я',
        'С Д Н Ё М   Р О Ж Д Е Н И Я !!!'
      ];
      const phrase = phrases[Math.floor(Math.random() * phrases.length)];
      const pos = Math.floor(Math.random() * (height - 12));
      line = line.substring(0, pos*12) + phrase + line.substring((pos + phrase.length)*12);
    }

    col.innerHTML = line;
    rain.appendChild(col);
  }

  setTimeout(rainBackground, 12000 + Math.random() * 14000);
}

// Запуск дождя сразу
rainBackground();

// Автоматический переход после поворота
function checkOrientation() {
  if (window.innerWidth > window.innerHeight) {
    // Горизонтально — переходим к отсчёту
    goTo(1);
    startCountdown();
  }
}

window.addEventListener('orientationchange', checkOrientation);
window.addEventListener('resize', checkOrientation);

// Проверка при загрузке
checkOrientation();

// Свайпы
let startTouchY = 0;
const swipeZone = document.getElementById('swipe-area');

swipeZone.addEventListener('touchstart', e => {
  startTouchY = e.touches[0].clientY;
}, {passive:true});

swipeZone.addEventListener('touchend', e => {
  const diff = startTouchY - e.changedTouches[0].clientY;
  if (Math.abs(diff) > 90) {
    if (diff > 0) { // вверх
      if (current === 3) { // на открытке
        const card = document.getElementById('card-flip');
        if (card.classList.contains('flipped')) {
          card.classList.remove('flipped');
          card.style.transform = 'rotateY(0deg)';
          setTimeout(() => {
            document.getElementById('final-heart-img').classList.add('visible');
          }, 1500);
        }
      }
    }
  }
}, {passive:true});

// Открытка клик
document.getElementById('card-flip').addEventListener('click', () => {
  const card = document.getElementById('card-flip');
  card.classList.toggle('flipped');
  card.style.transform = card.classList.contains('flipped')
    ? 'rotateY(180deg)'
    : 'rotateY(0deg)';
});

// Отсчёт
function startCountdown() {
  const numEl = document.getElementById('count');
  let n = 3;
  numEl.textContent = n;

  const timer = setInterval(() => {
    n--;
    numEl.textContent = n;
    if (n <= 0) {
      clearInterval(timer);
      setTimeout(() => {
        goTo(2);
        showWordsSequence();
      }, 1400);
    }
  }, 1600);
}

// Появление слов
function showWordsSequence() {
  const words = [
    document.getElementById('word-s'),
    document.getElementById('word-prazd'),
    document.getElementById('word-rod'),
    document.getElementById('word-heart')
  ];

  let i = 0;
  const interval = setInterval(() => {
    if (i > 0) words[i-1].classList.remove('visible');
    if (i < words.length) {
      words[i].classList.add('visible');
      i++;
    } else {
      clearInterval(interval);
      setTimeout(() => {
        document.getElementById('gif-congrats').style.opacity = '1';
      }, 2200);
      setTimeout(() => goTo(3), 6200);
    }
  }, 2600);
}
</script>
</body>
</html>
