<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>С праздником, родная! ❤️</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body, html {
      height: 100%;
      font-family: system-ui, -apple-system, sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
      touch-action: manipulation;
    }

    #scene-1, #scene-2, #scene-3, #scene-4, #scene-5 {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    .active {
      opacity: 1;
      pointer-events: all;
    }

    /* Сцена 1 — переверни телефон */
    #rotate-hint {
      font-size: 5vw;
      text-align: center;
      line-height: 1.4;
      animation: pulse 2s infinite;
    }
    #rotate-gif {
      max-width: 70vw;
      max-height: 40vh;
      margin: 30px 0;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.6; }
      50%     { opacity: 1; }
    }

    /* Сцена 2 — бегущий текст */
    .falling-text {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .falling-text span {
      position: absolute;
      color: #c300ff;
      font-size: 6vw;
      font-weight: bold;
      white-space: nowrap;
      text-shadow: 0 0 15px #c300ff88;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0%   { transform: translateY(-100%); }
      100% { transform: translateY(120vh); }
    }

    /* Сцена 3 — обратный отсчёт */
    #countdown {
      font-size: 25vw;
      font-weight: 900;
      color: #d500ff;
      text-shadow: 0 0 40px #d500ff, 0 0 80px #d500ff66;
      letter-spacing: -10px;
    }

    /* Сцена 4 — появляющиеся слова */
    .phrase {
      font-size: 11vw;
      font-weight: bold;
      margin: 12px 0;
      opacity: 0;
      transform: scale(0.6);
      transition: all 1.2s ease-out;
      text-shadow: 0 0 25px currentColor;
    }
    .phrase.visible {
      opacity: 1;
      transform: scale(1);
    }
    .heart {
      font-size: 18vw;
      color: #d500ff;
      animation: beat 1.4s infinite;
    }
    @keyframes beat {
      0%,100% { transform: scale(1); }
      50%     { transform: scale(1.15); }
    }

    /* Сцена 5 — открытка + свайпы */
    #postcard-container {
      width: 92vw;
      max-width: 380px;
      height: 75vh;
      max-height: 520px;
      perspective: 1200px;
      position: relative;
    }
    #postcard {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 1.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      cursor: pointer;
    }
    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 40px #000c;
    }
    .front {
      background: linear-gradient(135deg, #300050, #6000a0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10vw;
      font-weight: bold;
      color: #ffbfff;
      text-shadow: 0 0 20px #fff8;
    }
    .back {
      transform: rotateY(180deg);
      background: #111;
    }
    .back img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .bubble {
      position: absolute;
      top: 8%;
      left: 10%;
      right: 10%;
      background: rgba(255,255,255,0.92);
      color: #200040;
      padding: 14px 18px;
      border-radius: 16px;
      font-size: 4.5vw;
      line-height: 1.35;
      box-shadow: 0 4px 15px #0008;
      pointer-events: none;
    }

    /* Сердце из фото в конце */
    #final-heart {
      width: 80vw;
      max-width: 360px;
      height: 80vw;
      max-height: 360px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 60px #d500ff88, 0 0 120px #d500ff44;
      opacity: 0;
      transform: scale(0.3);
      transition: all 1.8s ease-out;
    }
    #final-heart.show {
      opacity: 1;
      transform: scale(1);
    }

    /* Управление свайпами */
    .swipe-zone {
      position: fixed;
      inset: 0;
      z-index: 10;
      touch-action: pan-y;
    }
  </style>
</head>
<body>

  <!-- Сцена 1 – переверни телефон -->
  <div id="scene-1" class="active">
    <div id="rotate-hint">Переверни телефон горизонтально 😍</div>
    <img id="rotate-gif" src="gif1.gif" alt="rotate phone animation">
  </div>

  <!-- Сцена 2 – бегущий текст -->
  <div id="scene-2" class="falling-text"></div>

  <!-- Сцена 3 – отсчёт -->
  <div id="scene-3">
    <div id="countdown">3</div>
  </div>

  <!-- Сцена 4 – слова по очереди -->
  <div id="scene-4">
    <div class="phrase" id="word1">С</div>
    <div class="phrase" id="word2">Праздником</div>
    <div class="phrase" id="word3">Родная</div>
    <div class="phrase" id="word4">
      <span class="heart">❤️</span>
    </div>
    <img id="congrats-gif" src="gif2.gif" style="max-width:70vw; margin-top:30px; opacity:0; transition:1s;">
  </div>

  <!-- Сцена 5 – открытка + свайпы -->
  <div id="scene-5">
    <div id="postcard-container">
      <div id="postcard">
        <div class="card-face front">Открытка</div>
        <div class="card-face back">
          <img id="photo1" src="photo1.jpg" alt="">
          <div class="bubble" id="text1">Люблю тебя безумно! 💜</div>
        </div>
      </div>
    </div>

    <img id="final-heart" src="photo-heart.jpg" alt="heart">
  </div>

  <div class="swipe-zone" id="swipeZone"></div>

<script>
// ----------------------------------------------------
let currentScene = 1;
const scenes = [
  document.getElementById("scene-1"),
  document.getElementById("scene-2"),
  document.getElementById("scene-3"),
  document.getElementById("scene-4"),
  document.getElementById("scene-5")
];

function goToScene(n) {
  scenes.forEach(s => s.classList.remove("active"));
  if (scenes[n-1]) scenes[n-1].classList.add("active");
  currentScene = n;
}

// Свайпы
let touchStartY = 0;
const swipeZone = document.getElementById("swipeZone");

swipeZone.addEventListener("touchstart", e => {
  touchStartY = e.touches[0].clientY;
}, {passive: true});

swipeZone.addEventListener("touchend", e => {
  const diff = touchStartY - e.changedTouches[0].clientY;
  if (Math.abs(diff) > 60) {
    if (diff > 0) handleNext();       // свайп вверх
    else handleBack();                 // свайп вниз
  }
}, {passive: true});

function handleNext() {
  if (currentScene === 1) {
    goToScene(2);
    startFallingText();
    setTimeout(() => goToScene(3), 5500);
    setTimeout(startCountdown, 5800);
  }
  else if (currentScene === 5) {
    // можно зациклить или оставить финал
  }
}

function handleBack() {
  if (currentScene === 5) {
    postcard.classList.remove("flipped");
    setTimeout(() => {
      document.getElementById("final-heart").classList.remove("show");
    }, 800);
  }
}

// ----------------------------------------------------
// Бегущий текст "С праздником!!!"
function startFallingText() {
  const container = document.getElementById("scene-2");
  const words = ["С праздником!!!", "С праздником!!!", "С праздником!!!"];
  
  for (let i = 0; i < 40; i++) {
    const span = document.createElement("span");
    span.textContent = words[i % words.length];
    span.style.left = Math.random() * 100 + "vw";
    span.style.animationDuration = (8 + Math.random() * 12) + "s";
    span.style.animationDelay = Math.random() * 4 + "s";
    container.appendChild(span);
  }
}

// ----------------------------------------------------
// Обратный отсчёт
function startCountdown() {
  const el = document.getElementById("countdown");
  let num = 3;

  const timer = setInterval(() => {
    num--;
    el.textContent = num;

    if (num <= 0) {
      clearInterval(timer);
      setTimeout(() => {
        goToScene(4);
        showPhrase();
      }, 800);
    }
  }, 1200);

  el.textContent = 3;
}

function showPhrase() {
  const words = [
    document.getElementById("word1"),
    document.getElementById("word2"),
    document.getElementById("word3"),
    document.getElementById("word4")
  ];

  let i = 0;
  const int = setInterval(() => {
    if (i > 0) words[i-1].classList.remove("visible");
    if (i < words.length) {
      words[i].classList.add("visible");
      i++;
    } else {
      clearInterval(int);
      setTimeout(() => {
        document.getElementById("congrats-gif").style.opacity = "1";
      }, 1400);
      setTimeout(() => goToScene(5), 4800);
    }
  }, 1800);
}

// ----------------------------------------------------
// Открытка (одна, но можно расширить до нескольких)
const postcard = document.getElementById("postcard");

postcard.addEventListener("click", () => {
  postcard.classList.toggle("flipped");
  postcard.style.transform = postcard.classList.contains("flipped")
    ? "rotateY(180deg)"
    : "rotateY(0deg)";
});

// После открытия — ждём свайп вверх → финальное сердце
swipeZone.addEventListener("touchend", e => {
  if (currentScene !== 5) return;
  const diff = touchStartY - e.changedTouches[0].clientY;
  if (diff > 80 && postcard.classList.contains("flipped")) {
    postcard.classList.remove("flipped");
    postcard.style.transform = "rotateY(0deg)";
    setTimeout(() => {
      document.getElementById("final-heart").classList.add("show");
    }, 900);
  }
});

</script>
</body>
</html>
